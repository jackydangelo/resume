name: Build and Deploy CV

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: CV.tex

      - name: Create site
        run: |
          mkdir public
          cp *.pdf public/cv.pdf

          echo '<html><body style="margin:0">
          <iframe src="cv.pdf" width="100%" height="100%"></iframe>
          </body></html>' > public/index.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
